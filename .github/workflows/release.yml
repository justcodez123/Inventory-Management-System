name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*' # Trigger the workflow automatically when you push a tag like v1.0.0

jobs:
  release:
    # Run on a Windows machine to properly build the .exe installer
    runs-on: windows-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    # Grant permissions for the GITHUB_TOKEN to create releases
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

      - name: Clean up ghost releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X DELETE repos/justcodez123/Inventory-Management-System/releases/338978932 --silent || echo "Ghost release cleared"
          gh release delete v1.1.1 -y || echo "No existing v1.1.1 release"

      - name: Build Application & Publish Release
        working-directory: ./app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          npm run build
          npx electron-builder --win --publish always
